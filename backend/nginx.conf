events { worker_connections 1024; }

http {
    upstream flask_backend {
        least_conn;
        server api1:5000 max_fails=3 fail_timeout=10s;
        server api2:5000 max_fails=3 fail_timeout=10s;
        server api3:5000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=devis_post:10m rate=5r/s;
    limit_req_status 429;   # ✅ 429 au lieu de 503

    gzip on;
    gzip_types application/json text/plain;

    log_format detailed '$remote_addr [$time_local] "$request" $status '
                        'upstream=$upstream_addr time=$upstream_response_time';
    access_log /var/log/nginx/access.log detailed;

    server {
        listen 80;

        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass          http://flask_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for; # ✅
            proxy_set_header    X-Forwarded-Proto $scheme;                    # ✅

            proxy_connect_timeout 5s;
            proxy_send_timeout   30s;
            proxy_read_timeout   30s;

            proxy_next_upstream       error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        location ~* ^/devis$ {
            limit_req zone=devis_post burst=20 nodelay;

            proxy_pass          http://flask_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for; # ✅
            proxy_set_header    X-Forwarded-Proto $scheme;                    # ✅

            proxy_connect_timeout 5s;
            proxy_send_timeout   30s;  # ✅ ajouté
            proxy_read_timeout   30s;

            proxy_next_upstream off;   # ✅ jamais retry un POST → pas de doublons
        }

        location /nginx-health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}